name: "Phase 3: Containerization"

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    name: "Docker Build & Push"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: "Login to Amazon ECR"
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: "Build & Push Backend to ECR"
        uses: docker/build-push-action@v7
        with:
          context: ./server
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/shopsmart-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "Build & Push Frontend to ECR"
        uses: docker/build-push-action@v7
        with:
          context: ./client
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/shopsmart-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
