name: "ShopSmart Ultimate Modular Pipeline"

on:
  workflow_dispatch: # Allows manual trigger from Actions tab

concurrency:
  group: production_pipeline
  cancel-in-progress: true

jobs:
  # Phase 1: Test then Terraform then Docker then Deploy
  
  phase-1-qa:
    name: "Phase 1: Testing & QA"
    uses: ./.github/workflows/01-test.yml
    secrets: inherit

  phase-2-infra:
    name: "Phase 2: Infrastructure"
    needs: phase-1-qa
    if: success()
    uses: ./.github/workflows/02-terraform.yml
    secrets: inherit

  phase-3-docker:
    name: "Phase 3: Docker Build"
    needs: phase-2-infra
    if: success()
    uses: ./.github/workflows/03-docker-build-push.yml
    secrets: inherit

  phase-4-ecs-deploy:
    name: "Phase 4: ECS Deployment"
    needs: phase-3-docker
    if: success()
    uses: ./.github/workflows/04-ecs-deploy.yml
    secrets: inherit

  # SAFETY TRAP: Cleanup on Failure
  cleanup-on-failure:
    name: "Safety Trap: Cleanup"
    needs: [phase-2-infra, phase-3-docker, phase-4-ecs-deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Terminate Ghost Resources
        run: |
          echo "=> Pipeline failed! Cleaning up to save costs..."
          # Terminate any EC2 instances tagged with 'shopsmart'
          IDS=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=shopsmart" "Name=instance-state-name,Values=running" --query "Reservations[].Instances[].InstanceId" --output text)
          if [ -n "$IDS" ]; then
            aws ec2 terminate-instances --instance-ids $IDS
            echo "Terminated: $IDS"
          fi
