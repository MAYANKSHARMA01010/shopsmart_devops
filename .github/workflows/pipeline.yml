name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  phase-1-testing:
    name: Phase 1 - Testing
    uses: ./.github/workflows/01-test.yml
    secrets: inherit

  phase-2-infrastructure:
    name: Phase 2 - Infrastructure Provisioning
    needs: phase-1-testing
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/02-terraform.yml
    secrets: inherit

  phase-3-docker-build:
    name: Phase 3 - Container Build and Push
    needs: phase-2-infrastructure
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/03-docker-build-push.yml
    secrets: inherit

  phase-4-ecs-deploy:
    name: Phase 4 - ECS Deployment
    needs: phase-3-docker-build
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/04-ecs-deploy.yml
    secrets: inherit
