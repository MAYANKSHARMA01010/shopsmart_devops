name: "ShopSmart Ultimate Modular Pipeline"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: production_pipeline
  cancel-in-progress: true

jobs:
  # Phase 1: Test then Terraform then Docker then Deploy
  
  phase-1-qa:
    name: "Phase 1: Testing & QA"
    uses: ./.github/workflows/01-test.yml
    secrets: inherit

  phase-2-infra:
    name: "Phase 2: Infrastructure"
    needs: phase-1-qa
    if: success()
    uses: ./.github/workflows/02-terraform.yml
    secrets: inherit

  phase-3-docker:
    name: "Phase 3: Docker Build"
    needs: phase-2-infra
    if: success()
    uses: ./.github/workflows/03-docker-build-push.yml
    secrets: inherit

  phase-4-deploy:
    name: "Phase 4: EC2 Deployment"
    needs: phase-3-docker
    if: success() && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/04-deploy.yml
    secrets: inherit
