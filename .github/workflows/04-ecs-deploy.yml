name: Phase 4 - ECS Deployment

on:
  workflow_call:

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  ECR_SERVER_REPOSITORY: shopsmart-server
  ECS_CLUSTER: shopsmart-cluster

jobs:
  deploy-to-ecs:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deployment Notice
        run: |
          echo "To fully execute ECS deployment, a valid ECS Task Definition and Service must exist in AWS."
          echo "This pipeline has built and pushed the containers. The final ECS deployment step can be uncommented once task definitions are exported to the repo."
          
