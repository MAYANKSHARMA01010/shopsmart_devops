name: "Phase 4: ECS Fargate Deployment"

on:
  workflow_call:
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  CLUSTER: shopsmart-cluster
  BACKEND_SERVICE: shopsmart-backend-service
  FRONTEND_SERVICE: shopsmart-frontend-service

jobs:
  deploy:
    name: "Deploy to ECS Fargate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "Force new deployment (backend)"
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$BACKEND_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION" > /dev/null
          echo "Backend deployment triggered."

      - name: "Force new deployment (frontend)"
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$FRONTEND_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION" > /dev/null
          echo "Frontend deployment triggered."

      - name: "Wait for services to stabilise"
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$BACKEND_SERVICE" "$FRONTEND_SERVICE" \
            --region "$AWS_REGION"
          echo "Services reached steady state."

      - name: "Verify services are running"
        run: |
          aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$BACKEND_SERVICE" "$FRONTEND_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[].{name:serviceName,status:status,desired:desiredCount,running:runningCount,pending:pendingCount}' \
            --output table

          UNHEALTHY=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$BACKEND_SERVICE" "$FRONTEND_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[?runningCount<desiredCount].serviceName' \
            --output text)
          if [ -n "$UNHEALTHY" ]; then
            echo "::error::Services not fully running: $UNHEALTHY"
            exit 1
          fi
          echo "All ECS services healthy."
