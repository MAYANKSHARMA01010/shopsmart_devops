name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: shopsmart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'
        
    - name: Install dependencies
      run: pnpm install
      
    - name: Lint Server
      run: pnpm --filter server lint
      
    - name: Lint Client
      run: pnpm --filter shopsmart-frontend lint

    - name: Prisma Generate
      run: pnpm --filter server prisma generate
      
    - name: Prisma Migrate (Test DB)
      run: pnpm --filter server prisma migrate deploy
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/shopsmart_test
        
    - name: Test Server
      run: pnpm --filter server test
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/shopsmart_test
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: test-secret-key-12345
        
    - name: Test Client
      run: pnpm --filter shopsmart-frontend test

    - name: Build Server
      run: pnpm --filter server build

    - name: Build Client
      run: pnpm --filter shopsmart-frontend build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:5001

  docker-dry-run:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
    - uses: actions/checkout@v4
    - name: Docker Compose Build
      run: docker compose build
