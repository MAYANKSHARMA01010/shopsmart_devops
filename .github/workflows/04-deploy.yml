name: "Phase 4: EC2 Orchestration"

on:
  workflow_call:
  workflow_dispatch:

jobs:
  deploy:
    name: "Remote Rollout"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Transfer Runtime Config (SCP)"
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/shopsmart/"

      - name: "Execute Deployment (SSH)"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/shopsmart
            echo "Starting Zero-Downtime Rollout..."
            
            # Export environment variables for Docker Compose
            export EC2_HOST=${{ secrets.EC2_HOST }}
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"

            # 1. Pull latest images from Docker Hub
            sudo -E docker compose pull
            
            # 2. Restart services (Leveraging Healthchecks from docker-compose.yml)
            sudo -E docker compose up -d
            
            # 3. Clean up dangling images to save space
            sudo docker image prune -f
            
            echo "Deployment Complete! Service is now online."
            sudo docker compose ps
