name: "Masterclass: End-to-End EC2 Deployment"

# This workflow demonstrates the full range of DevOps skills learned:
# 1. CI/CD Pipeline Orchestration
# 2. Infrastructure-as-Code (Terraform)
# 3. Containerization (Docker)
# 4. Secure Remote Orchestration (SSH/SCP)
# 5. Production Reliability (Healthchecks & Pruning)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # STEP 1: VERIFY
  verify:
    name: Code & Infra Audit
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with: { version: 10 }
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
      - name: Code Quality (Lint)
        run: |
          cd server && pnpm install --no-frozen-lockfile && pnpm lint
          cd ../client && pnpm install --no-frozen-lockfile && pnpm lint
      - name: Infrastructure Validation
        run: cd terraform && terraform init -backend=false && terraform validate
      - name: Run Unit Tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd server && pnpm test
          cd ../client && pnpm test

  # STEP 2: PACKAGE
  package:
    name: Containerize
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build & Push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/shopsmart-server:latest ./server
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/shopsmart-server:latest

  # STEP 3: SHIP
  deploy:
    name: EC2 Deployment
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync Config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/shopsmart/"
      - name: Execute
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/shopsmart
            export EC2_HOST=${{ secrets.EC2_HOST }}
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            sudo -E docker compose pull
            sudo -E docker compose up -d
            sudo docker image prune -f
            echo "Deployment successful on host: ${{ secrets.EC2_HOST }}"

  cleanup:
    name: Safety Cleanup
    needs: [verify, package, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1
      - name: Terminate Ghost EC2
        run: |
          IDS=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=Ubuntu-CLI-Auto" "Name=instance-state-name,Values=running" --query "Reservations[].Instances[].InstanceId" --output text)
          if [ -n "$IDS" ]; then
            aws ec2 terminate-instances --instance-ids $IDS
          fi
