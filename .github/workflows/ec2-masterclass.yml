name: "Masterclass: End-to-End EC2 Deployment"

# This workflow demonstrates the full range of DevOps skills learned:
# 1. CI/CD Pipeline Orchestration
# 2. Infrastructure-as-Code (Terraform)
# 3. Containerization (Docker)
# 4. Secure Remote Orchestration (SSH/SCP)
# 5. Production Reliability (Healthchecks & Pruning)

on:
  workflow_dispatch:

jobs:
  # STEP 1: VERIFY
  verify:
    name: Code & Infra Audit
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: shopsmart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with: { version: 10 }
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
      - name: Code Quality (Lint)
        run: |
          cd server && pnpm install --no-frozen-lockfile && pnpm lint
          cd ../client && pnpm install --no-frozen-lockfile && pnpm lint
      - name: Infrastructure Validation
        run: cd terraform && terraform init -backend=false && terraform validate
      - name: Run Integration Tests
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/shopsmart_test
        run: |
          cd server
          pnpm prisma db push
          pnpm test
          cd ../client
          pnpm test

  # STEP 2: PACKAGE
  package:
    name: Containerize
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build & Push Images
        run: |
          # Build and push Server
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/shopsmart-server:latest ./server
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/shopsmart-server:latest
          
          # Build and push Client
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/shopsmart-client:latest ./client
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/shopsmart-client:latest

  # STEP 3: SHIP
  deploy:
    name: EC2 Deployment
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1
      - name: Get Runner IP
        id: ip
        run: echo "ipv4=$(curl -s https://checkip.amazonaws.com)" >> $GITHUB_OUTPUT
      - name: Verify SSH Port
        run: |
          echo "Testing connection to ${{ secrets.EC2_HOST }}:22..."
          nc -zv -w 15 ${{ secrets.EC2_HOST }} 22
      - name: Sync Config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/shopsmart/"
      - name: Execute
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/shopsmart
            # Create dummy directories to satisfy docker-compose build context requirements
            mkdir -p server client
            export EC2_HOST=${{ secrets.EC2_HOST }}
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            sudo -E docker compose pull
            sudo -E docker compose up -d --no-build
            sudo docker image prune -f
            echo "Deployment successful on host: ${{ secrets.EC2_HOST }}"

  cleanup:
    name: Safety Cleanup
    needs: [verify, package, deploy]
    if: failure()
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup Note
        run: echo "Cleanup discovery is forbidden in this lab environment. Manual cleanup required if instances are orphaned."
