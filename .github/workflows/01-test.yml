name: Phase 1 - Testing & QA

on:
  workflow_call:

jobs:
  validate:
    name: Lint & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Backend QA
        working-directory: ./server
        run: |
          pnpm install --no-frozen-lockfile
          pnpm lint
          pnpm audit --audit-level high || echo "Security warnings found"

      - name: Frontend QA
        working-directory: ./client
        run: |
          pnpm install --no-frozen-lockfile
          pnpm lint
