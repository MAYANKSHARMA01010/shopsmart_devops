services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shopsmart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shopsmart"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopsmart-net

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopsmart-net

  backend:
    build: ./server
    image: ${DOCKERHUB_USERNAME:-mayanksharma01010}/shopsmart-server:latest
    restart: always
    ports:
      - "5001:5001"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:password@db:5432/shopsmart}
      REDIS_SERVER_URL: redis://redis:6379
      REDIS_LOCAL_URL: redis://redis:6379
      NODE_ENV: production
      FRONTEND_LOCAL_URL: http://${EC2_HOST:-localhost}:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma db push && pnpm start"
    networks:
      - shopsmart-net

  frontend:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_URL: http://backend:5001
    image: ${DOCKERHUB_USERNAME:-mayanksharma01010}/shopsmart-client:latest
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5001
      NEXT_PUBLIC_LOCAL_BACKEND_URL: http://${EC2_HOST:-localhost}:5001/api
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - shopsmart-net

networks:
  shopsmart-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data: