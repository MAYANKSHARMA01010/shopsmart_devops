version: '3.8'

services:
  postgres-test:
    image: postgres:15-alpine
    container_name: shopsmart-postgres-test
    environment:
      POSTGRES_USER: shopsmart
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shopsmart_test
    ports:
      - "5433:5432" # Mapped to 5433 to avoid collision with main dev DB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopsmart -d shopsmart_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:7-alpine
    container_name: shopsmart-redis-test
    ports:
      - "6380:6379" # Mapped to 6380 to avoid collision
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
