apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: shopsmart-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopsmart-backend
  template:
    metadata:
      labels:
        app: shopsmart-backend
    spec:
      containers:
      - name: backend
        image: <YOUR_AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/shopsmart-server:latest
        ports:
        - containerPort: 5001
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: shopsmart-secrets
              key: DATABASE_URL
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: shopsmart-prod
spec:
  type: ClusterIP
  selector:
    app: shopsmart-backend
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001
